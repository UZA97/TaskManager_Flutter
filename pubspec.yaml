name: taskmanager
description: "Task Manager - 메모, 캘린더, 메일 통합 앱"
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.6.1

  # DB
  drift: ^2.20.0
  drift_flutter: ^0.2.4

  # 에디터
  appflowy_editor: ^4.0.0

  # 시스템 트레이
  tray_manager: ^0.2.3

  # 알림
  local_notifier: ^0.1.6

  # 파일 선택
  file_picker: ^8.3.7

  # IMAP
  enough_mail: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true