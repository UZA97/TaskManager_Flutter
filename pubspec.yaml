name: taskmanager
description: "Task Manager - 메모, 캘린더, 메일 통합 앱"
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

  # 상태관리
  flutter_riverpod: ^2.6.1

  # DB
  drift: ^2.20.0
  drift_flutter: ^0.2.8

  window_manager: ^0.5.1

  # 에디터
  appflowy_editor: ^6.2.0

  # 시스템 트레이
  tray_manager: ^0.5.3

  # 드래그앤드롭
  desktop_drop: ^0.7.1

  # 알림
  local_notifier: ^0.1.6

  # 파일 선택
  file_picker: ^10.0.2

  # IMAP
  enough_mail: ^2.1.7

  # Google OAuth
  google_sign_in_all_platforms: ^2.0.0
  crypto: ^3.0.3
  http: ^1.5.0

  # 클립보드
  pasteboard: ^0.5.0

  # 경로 처리
  path: ^1.9.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.0

  # 지도
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # provider (appflowy_editor 내부 사용)
  provider: ^6.1.2

  flutter_highlight: ^0.7.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
  assets:
    - assets/